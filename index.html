<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spot The Fake</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

/* Global */
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
  height: 100%;
  overflow: hidden;
}

/* Welcome background */
#welcome {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('YOUR_IMAGE_URL_HERE') no-repeat center center;
  background-size: cover;
  transition: opacity 0.8s ease;
  z-index: 2;
}

#welcome.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Card overlay */
.card {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  padding: 40px;
  max-width: 700px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  transition: transform 0.5s ease, opacity 0.5s ease;
}

/* Headings */
h1, h2 {
  margin-bottom: 15px;
  color: #1f2d3d;
}

.subtitle {
  margin-bottom: 30px;
  color: #6b7c93;
  font-size: 1.2rem;
}

/* Inputs */
input[type="text"] {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #dce3ec;
  font-size: 16px;
  margin-bottom: 20px;
}

input[type="range"] {
  width: 100%;
}

/* Button */
button {
  background: #4c6ef5;
  color: white;
  padding: 12px 25px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #364fc7;
  transform: translateY(-2px);
}

/* Game and results screens */
#game, #results, #thanks {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

.images {
  display: flex;
  gap: 20px;
  margin-top: 25px;
}

.images img {
  width: 50%;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.3s;
  border: 3px solid transparent;
}

.images img:hover {
  transform: scale(1.03);
  border-color: #4c6ef5;
}

.tip {
  margin-top: 20px;
  padding: 15px;
  background: #edf2ff;
  border-radius: 12px;
  color: #364fc7;
}

.progress {
  text-align: center;
  margin-top: 10px;
  color: #6b7c93;
}

.results-box {
  background: #f8f9ff;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}

.center { text-align: center; margin-top: 20px; }
</style>
</head>

<body>

<!-- Welcome Screen -->
<div id="welcome">
  <div class="card">
    <h1>Can You Spot the Fake?</h1>
    <p class="subtitle">Train your eye to detect AI-generated images and improve your digital literacy.</p>
    
    <input type="text" id="nickname" placeholder="Enter your nickname">
    
    <label>How confident are you? (<span id="confValue">50</span>%)</label>
    <input type="range" id="confidence" min="1" max="100" value="50"><br><br>
    
    <button onclick="startGame()">Start Training</button>
  </div>
</div>

<!-- Game Screen -->
<div id="game">
  <div class="card">
    <h2 id="phaseTitle"></h2>
    <div class="progress" id="roundInfo"></div>
    
    <div class="images">
      <img id="img1" onclick="choose(0)">
      <img id="img2" onclick="choose(1)">
    </div>
    
    <div id="feedback" class="tip hidden"></div>
    
    <div class="center">
      <button id="nextBtn" class="hidden" onclick="next()">Next Round</button>
    </div>
  </div>
</div>

<!-- Results Screen -->
<div id="results">
  <div class="card">
    <h2>Results</h2>
    <div class="results-box" id="resultText"></div>
    
    <h3 class="center">Final Survey</h3>
    
    <label>How confident are you now? (<span id="finalConfValue">50</span>%)</label>
    <input type="range" id="finalConfidence" min="1" max="100" value="50"><br><br>
    
    <label>How helpful was this site? (1–5)</label>
    <input type="number" id="rating" min="1" max="5"><br><br>
    
    <div class="center">
      <button onclick="finish()">Submit</button>
    </div>
  </div>
</div>

<!-- Thank You Screen -->
<div id="thanks" class="center">
  <div class="card">
    <h2>Thank You!</h2>
    <p>We hope you’ve become more confident at identifying AI-generated images.</p>
  </div>
</div>

<script>
const rounds = [
  {images:["https://via.placeholder.com/500","https://via.placeholder.com/500"], correct:0, tip:"AI often struggles with realistic hands, shadows, and fine background details."},
  {images:["https://via.placeholder.com/500","https://via.placeholder.com/500"], correct:1, tip:"Look for unnatural lighting or overly smooth textures."},
  {images:["https://via.placeholder.com/500","https://via.placeholder.com/500"], correct:0, tip:"Check symmetry and repeated patterns."},
  {images:["https://via.placeholder.com/500","https://via.placeholder.com/500"], correct:1, tip:"Zoom in mentally for distorted small elements."},
  {images:["https://via.placeholder.com/500","https://via.placeholder.com/500"], correct:0, tip:"Watch for warped text or background artifacts."}
];

let phase = 1;
let round = 0;
let score1 = 0;
let score2 = 0;
let name = "";

document.getElementById("confidence").oninput = function() {
  document.getElementById("confValue").innerText = this.value;
};

document.getElementById("finalConfidence").oninput = function() {
  document.getElementById("finalConfValue").innerText = this.value;
};

function startGame() {
  name = document.getElementById("nickname").value || "Participant";
  
  // Fade out welcome
  const welcome = document.getElementById("welcome");
  welcome.classList.add("hidden");
  
  // Show game after fade
  setTimeout(() => {
    document.getElementById("game").style.display = "flex";
    loadRound();
  }, 800);
}

function loadRound() {
  document.getElementById("feedback").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");

  document.getElementById("phaseTitle").innerText = phase === 1 ? "Phase 1" : "Phase 2 – Learning Mode";
  document.getElementById("roundInfo").innerText = "Round " + (round+1) + " of 5";

  document.getElementById("img1").src = rounds[round].images[0];
  document.getElementById("img2").src = rounds[round].images[1];
}

function choose(choice) {
  const feedback = document.getElementById("feedback");
  feedback.classList.remove("hidden");

  if(choice === rounds[round].correct) {
    feedback.innerText = "Correct! " + rounds[round].tip;
    if(phase === 1) score1++; else score2++;
  } else {
    feedback.innerText = "Not quite. " + rounds[round].tip;
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

function next() {
  round++;
  if(round < 5) {
    loadRound();
  } else {
    if(phase === 1) {
      phase = 2;
      round = 0;
      loadRound();
    } else {
      showResults();
    }
  }
}

function showResults() {
  document.getElementById("game").style.display = "none";
  document.getElementById("results").style.display = "flex";

  let improvement = (score2 - score1) * 20;

  document.getElementById("resultText").innerHTML =
    "<strong>" + name + "</strong><br><br>" +
    "Phase 1 Accuracy: " + (score1*20) + "%<br>" +
    "Phase 2 Accuracy: " + (score2*20) + "%<br>" +
    "Improvement: " + improvement + "%";
}

function finish() {
  document.getElementById("results").style.display = "none";
  document.getElementById("thanks").style.display = "flex";
}
</script>

</body>
</html>
