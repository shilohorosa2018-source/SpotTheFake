<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spot the AI</title>
<style>
/* Reset */
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  overflow-x: hidden;
}

/* Fullscreen welcome page */
#welcomePage {
  background: url('https://i.pinimg.com/1200x/e9/c3/80/e9c380cc63539a5c3b0867834f5c6887.jpg') no-repeat center center/cover;
  width: 100%;
  height: 100vh;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* Overlay for dimming */
#welcomePage::before {
  content: '';
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.3);
}

/* Welcome content card */
.welcome-content {
  position: relative;
  z-index: 2;
  max-width: 600px;
  padding: 30px 40px;
  background: rgba(0,0,0,0.6);
  border-radius: 16px;
  backdrop-filter: blur(4px);
}

.welcome-content h1 {
  font-size: 3em;
  margin-bottom: 15px;
}

.welcome-content p {
  font-size: 1.2em;
  margin-bottom: 30px;
}

button {
  padding: 12px 28px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #4a90e2;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #357abd;
  transform: scale(1.05);
}

/* Shooting stars */
.shooting-star {
  position: absolute;
  width: 3px;
  height: 80px;
  background: linear-gradient(45deg, white, rgba(255,255,255,0));
  transform: rotate(45deg);
  animation: shoot 2.5s linear infinite;
}

@keyframes shoot {
  0% { transform: translate(0,0) rotate(45deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translate(120vw, 80vh) rotate(45deg); opacity: 0; }
}

/* Nickname input card */
#nicknameCard {
  display: none;
  position: absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 40px 30px;
  border-radius: 16px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  z-index: 3;
}

#nicknameCard h2 {
  margin-bottom: 20px;
  color: #2c3e50;
}

#nicknameCard input[type="text"] {
  width: 80%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 20px;
  font-size: 16px;
}

#nicknameCard input[type="range"] {
  width: 80%;
  margin: 10px 0;
}

#nicknameCard button {
  width: 60%;
}

/* Main game container */
.container {
  width: 90%;
  max-width: 900px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  display: none;
}

h1, h2 {
  text-align: center;
  color: #2c3e50;
}

.images {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
}

.images img {
  width: 45%;
  border-radius: 10px;
  cursor: pointer;
  border: 3px solid transparent;
  transition: 0.3s;
}

.images img:hover {
  border-color: #4a90e2;
}

.tip {
  margin-top: 15px;
  padding: 10px;
  background: #e8f0fe;
  border-radius: 8px;
}

.hidden { display: none; }

.progress {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}

/* Feedback colors */
#feedback.correct { background: #d4edda; color: #155724; }
#feedback.incorrect { background: #f8d7da; color: #721c24; }

/* Responsive images */
@media (max-width: 600px) {
  .images {
    flex-direction: column;
    gap: 15px;
  }
  .images img { width: 100%; }
}
</style>
</head>
<body>

<!-- Welcome page -->
<div id="welcomePage">
  <div class="welcome-content">
    <h1>Welcome to Spot the AI</h1>
    <p>Test your skills at identifying AI-generated images. Click below when you're ready!</p>
    <button onclick="showNicknameCard()">I'm Ready</button>
  </div>
  <!-- Multiple shooting stars -->
  <div class="shooting-star" style="top:20%; left:-150px; animation-delay:0s;"></div>
  <div class="shooting-star" style="top:35%; left:-200px; animation-delay:1.5s;"></div>
  <div class="shooting-star" style="top:50%; left:-100px; animation-delay:3s;"></div>
  <div class="shooting-star" style="top:25%; left:-250px; animation-delay:4.2s;"></div>
</div>

<!-- Nickname input card -->
<div id="nicknameCard">
  <h2>Enter Your Nickname</h2>
  <input type="text" id="nickname" placeholder="Nickname"><br>
  <label>How confident are you? (1-100%)</label><br>
  <input type="range" id="confidence" min="1" max="100" value="50">
  <p id="confidenceValue">50%</p><br>
  <button onclick="startPhase()">Start</button>
</div>

<!-- Main Game Container -->
<div class="container" id="gameContainer">

  <div id="game" class="hidden">
    <h2 id="phaseTitle"></h2>
    <div class="progress" id="roundInfo"></div>
    <div class="images">
      <img id="img1" onclick="selectImage(0)">
      <img id="img2" onclick="selectImage(1)">
    </div>
    <div id="feedback" class="tip hidden"></div>
    <button id="nextBtn" class="hidden" onclick="nextRound()">Next</button>
  </div>

  <div id="results" class="hidden">
    <h2>Results</h2>
    <p id="resultText"></p>
    <h3>Final Survey</h3>
    <label>How confident are you now? (1-100%)</label><br>
    <input type="range" id="finalConfidence" min="1" max="100" value="50"><br><br>
    <label>How helpful was this site? (1-5)</label><br>
    <input type="number" id="rating" min="1" max="5"><br>
    <button onclick="finish()">Submit</button>
  </div>

  <div id="thankyou" class="hidden">
    <h2>Thank You!</h2>
    <p>We hope you've become more confident at spotting AI-generated images.</p>
  </div>
</div>

<script>
/* Range slider display */
document.getElementById("confidence").oninput = function(){
  document.getElementById("confidenceValue").innerText = this.value + "%";
};

/* Show nickname card */
function showNicknameCard(){
  document.getElementById('welcomePage').style.display = 'none';
  document.getElementById('nicknameCard').style.display = 'block';
}

/* Game logic */
const rounds = [
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"], correct:0, tip:"Look closely at unnatural lighting and distorted small details like fingers or text."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"], correct:1, tip:"AI often struggles with symmetry and background consistency."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"], correct:0, tip:"Check for overly smooth skin or unrealistic textures."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"], correct:1, tip:"Zoom in mentally — small artifacts often reveal AI generation."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"], correct:0, tip:"Watch for strange shadows and warped objects."},
];

let phase = 1;
let currentRound = 0;
let score1 = 0;
let score2 = 0;
let nickname = "";

function startPhase(){
  nickname = document.getElementById("nickname").value || "Player";
  document.getElementById('nicknameCard').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';
  document.getElementById("game").classList.remove("hidden");
  loadRound();
}

function loadRound(){
  document.getElementById("feedback").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("phaseTitle").innerText = phase === 1 ? "Phase 1" : "Phase 2 - Learning Mode";
  document.getElementById("roundInfo").innerText = "Round " + (currentRound+1) + " of 5";
  document.getElementById("img1").src = rounds[currentRound].images[0];
  document.getElementById("img2").src = rounds[currentRound].images[1];
}

function selectImage(choice){
  const round = rounds[currentRound];
  const feedback = document.getElementById("feedback");
  feedback.classList.remove("hidden");
  if(choice === round.correct){
    feedback.innerText = "Correct! " + round.tip;
    feedback.classList.add("correct"); feedback.classList.remove("incorrect");
    if(phase === 1) score1++; else score2++;
  } else {
    feedback.innerText = "Not quite. " + round.tip;
    feedback.classList.add("incorrect"); feedback.classList.remove("correct");
  }
  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextRound(){
  currentRound++;
  if(currentRound < 5){ loadRound(); }
  else{
    if(phase === 1){ phase = 2; currentRound = 0; loadRound(); }
    else{ showResults(); }
  }
}

function showResults(){
  document.getElementById("game").classList.add("hidden");
  document.getElementById("results").classList.remove("hidden");
  let improvement = score2 - score1;
  document.getElementById("resultText").innerHTML =
    nickname + ",<br><br>" +
    "Phase 1 Accuracy: " + (score1*20) + "%<br>" +
    "Phase 2 Accuracy: " + (score2*20) + "%<br>" +
    "Improvement: " + (improvement*20) + "%";
}

function finish(){
  document.getElementById("results").classList.add("hidden");
  document.getElementById("thankyou").classList.remove("hidden");
}
</script>

</body>
</html>
