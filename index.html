<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spot the AI</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 90%;
  max-width: 900px;
  margin-top: 40px;
  background: white;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1, h2 {
  text-align: center;
  color: #2c3e50;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #4a90e2;
  color: white;
  cursor: pointer;
  font-size: 16px;
  margin-top: 15px;
}

button:hover {
  background: #357abd;
}

.images {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
}

.images img {
  width: 45%;
  border-radius: 10px;
  cursor: pointer;
  border: 3px solid transparent;
  transition: 0.3s;
}

.images img:hover {
  border-color: #4a90e2;
}

.tip {
  margin-top: 15px;
  padding: 10px;
  background: #e8f0fe;
  border-radius: 8px;
}

.hidden { display: none; }

.progress {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>
<div class="container">

<div id="welcome">
  <h1>Can You Spot the AI?</h1>
  <input type="text" id="nickname" placeholder="Enter your nickname"><br><br>
  <label>How confident are you? (1-100%)</label><br>
  <input type="range" id="confidence" min="1" max="100" value="50">
  <p id="confidenceValue">50%</p>
  <button onclick="startPhase()">Start</button>
</div>

<div id="game" class="hidden">
  <h2 id="phaseTitle"></h2>
  <div class="progress" id="roundInfo"></div>
  <div class="images">
    <img id="img1" onclick="selectImage(0)">
    <img id="img2" onclick="selectImage(1)">
  </div>
  <div id="feedback" class="tip hidden"></div>
  <button id="nextBtn" class="hidden" onclick="nextRound()">Next</button>
</div>

<div id="results" class="hidden">
  <h2>Results</h2>
  <p id="resultText"></p>
  <h3>Final Survey</h3>
  <label>How confident are you now? (1-100%)</label><br>
  <input type="range" id="finalConfidence" min="1" max="100" value="50"><br><br>
  <label>How helpful was this site? (1-5)</label><br>
  <input type="number" id="rating" min="1" max="5"><br>
  <button onclick="finish()">Submit</button>
</div>

<div id="thankyou" class="hidden">
  <h2>Thank You!</h2>
  <p>We hope you've become more confident at spotting AI-generated images.</p>
</div>

</div>

<script>
const rounds = [
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"],
   correct:0,
   tip:"Look closely at unnatural lighting and distorted small details like fingers or text."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"],
   correct:1,
   tip:"AI often struggles with symmetry and background consistency."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"],
   correct:0,
   tip:"Check for overly smooth skin or unrealistic textures."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"],
   correct:1,
   tip:"Zoom in mentally — small artifacts often reveal AI generation."},
  {images:["https://via.placeholder.com/400","https://via.placeholder.com/400"],
   correct:0,
   tip:"Watch for strange shadows and warped objects."},
];

let phase = 1;
let currentRound = 0;
let score1 = 0;
let score2 = 0;
let nickname = "";

document.getElementById("confidence").oninput = function(){
  document.getElementById("confidenceValue").innerText = this.value + "%";
};

function startPhase(){
  nickname = document.getElementById("nickname").value;
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  loadRound();
}

function loadRound(){
  document.getElementById("feedback").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");

  document.getElementById("phaseTitle").innerText = 
    phase === 1 ? "Phase 1" : "Phase 2 - Learning Mode";

  document.getElementById("roundInfo").innerText =
    "Round " + (currentRound+1) + " of 5";

  document.getElementById("img1").src = rounds[currentRound].images[0];
  document.getElementById("img2").src = rounds[currentRound].images[1];
}

function selectImage(choice){
  const round = rounds[currentRound];
  const feedback = document.getElementById("feedback");
  feedback.classList.remove("hidden");

  if(choice === round.correct){
    feedback.innerText = "Correct! " + round.tip;
    if(phase === 1) score1++;
    else score2++;
  } else {
    feedback.innerText = "Not quite. " + round.tip;
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

function nextRound(){
  currentRound++;
  if(currentRound < 5){
    loadRound();
  } else {
    if(phase === 1){
      phase = 2;
      currentRound = 0;
      loadRound();
    } else {
      showResults();
    }
  }
}

function showResults(){
  document.getElementById("game").classList.add("hidden");
  document.getElementById("results").classList.remove("hidden");

  let improvement = score2 - score1;
  document.getElementById("resultText").innerHTML =
    nickname + ",<br><br>" +
    "Phase 1 Accuracy: " + (score1*20) + "%<br>" +
    "Phase 2 Accuracy: " + (score2*20) + "%<br>" +
    "Improvement: " + (improvement*20) + "%";
}

function finish(){
  document.getElementById("results").classList.add("hidden");
  document.getElementById("thankyou").classList.remove("hidden");
}
</script>

</body>
</html>
